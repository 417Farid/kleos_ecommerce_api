version: "3.9"

services:
  db:
    image: postgres:15
    container_name: kleos_store_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nomelase
      POSTGRES_DB: kleos_store
    ports:
      - "5432:5432"
    volumes:
      - kleos_postgres_data:/var/lib/postgresql/data

volumes:
  kleos_postgres_data:
